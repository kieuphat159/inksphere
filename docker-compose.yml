version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: inksphere-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inksphere
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inksphere-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: inksphere-api
    ports:
      - '8000:8000'
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/inksphere?schema=public
      DIRECT_URL: postgresql://postgres:password@postgres:5432/inksphere?schema=public
      FRONTEND_URL: http://localhost:3000
      PORT: 8000
      JWT_SECRET: super_secret_jwt_key_for_development_purposes
      JWT_EXPIRES_IN: 7d
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    container_name: inksphere-frontend
    ports:
      - '3000:3000'
    env_file:
      - apps/frontend/.env
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      BACKEND_URL: http://api:8000
      SESSION_SECRET_KEY: super_secret_session_key_for_nextjs_development_purposes
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
